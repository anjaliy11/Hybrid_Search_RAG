voice_format: |
  Reformat this answer for spoken voice/TTS delivery.

  Formatting rules:
  1. Spell out abbreviations on first use:
     - "RAG" → "R-A-G, or Retrieval Augmented Generation"
     - "LLM" → "L-L-M, or Large Language Model"
     - "NLP" → "N-L-P, or Natural Language Processing"
  2. Use short sentences (maximum 15-20 words each)
  3. Replace citation brackets naturally:
     - "[Doc 1]" → "According to the first source document"
     - "[Doc 2]" → "The second source indicates that"
  4. Use spoken transitions:
     - "First, ...", "Additionally, ...", "Finally, ...", "In summary, ..."
  5. Avoid parenthetical asides entirely
  6. Spell out special characters:
     - ">" → "greater than"
     - "%" → "percent"
     - Numbers: "15" → "fifteen"
  7. Make it conversational but informative
  8. Spell out emails and URLs character by character

  Original answer:
  {answer}

  Voice-optimized version:

